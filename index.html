<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kolping Estadual de São Paulo - Recibos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Spectral:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --ink:#F0ECE8; --ink-soft:#8A8FA8; --ink-muted:#5A6080;
  --paper:#13151F; --surface:#1C1F2E; --surface-2:#242838; --surface-3:#2C3045;
  --line:#2E3248; --line-soft:#252840;
  --brand:#F07830; --brand-deep:#C85E1C; --brand-tint:rgba(240,120,48,.12); --brand-mid:#F09050;
  --brand-glow:rgba(240,120,48,.25);
  --sidebar:#0E1018; --sidebar-ink:#D8D4EE; --sidebar-soft:#4A5070;
  --ok:#22C984; --ok-tint:rgba(34,201,132,.12);
  --warn:#FF5263; --warn-tint:rgba(255,82,99,.12);
  --blue:#6EA8FF; --blue-tint:rgba(110,168,255,.12);
  --purple:#B07EFF; --purple-tint:rgba(176,126,255,.12);
  --font-ui:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-doc:'Spectral',Georgia,'Times New Roman',serif;
  --radius:12px; --radius-lg:16px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow:0 4px 12px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.3);
  --shadow-lg:0 16px 40px rgba(0,0,0,.5),0 6px 16px rgba(0,0,0,.4);
  --shadow-glow:0 0 0 1px var(--brand-tint),0 8px 24px var(--brand-glow);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-ui);color:var(--ink);background:var(--paper);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:var(--brand)}
.app{display:flex;min-height:100vh}
.sidebar{width:256px;background:var(--sidebar);color:var(--sidebar-ink);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:40;border-right:1px solid var(--line)}
.brand{padding:24px 20px 20px;border-bottom:1px solid var(--line)}
.brand .mark{display:flex;align-items:center;gap:12px}
.brand .k{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand-deep));color:#fff;display:grid;place-items:center;font-weight:700;font-size:20px;flex:none;box-shadow:0 2px 12px var(--brand-glow);overflow:hidden}
.brand .k img{width:38px;height:38px;object-fit:contain;border-radius:10px}
.brand .name{font-weight:700;font-size:14px;line-height:1.25;letter-spacing:-.01em;color:#E8E4F4}
.brand .sub{font-size:11px;color:var(--sidebar-soft);margin-top:3px;letter-spacing:.03em}
.nav{padding:12px 10px;flex:1;overflow-y:auto}
.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;color:var(--sidebar-soft);padding:10px 12px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:1px;transition:all .15s}
.nav button:hover{background:rgba(255,255,255,.05);color:var(--sidebar-ink)}
.nav button.active{background:linear-gradient(135deg,rgba(240,120,48,.2),rgba(200,94,28,.15));color:var(--brand);border:1px solid rgba(240,120,48,.25);box-shadow:0 0 12px rgba(240,120,48,.1)}
.nav button svg{width:16px;height:16px;flex:none}
.nav .sec{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--sidebar-soft);padding:16px 12px 6px;opacity:.6}
.side-foot{padding:14px 16px;border-top:1px solid var(--line);font-size:11px;color:var(--sidebar-soft);line-height:1.6}
.drive-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:9px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;margin:8px 10px 4px;border:1px solid transparent}
.drive-status.connected{background:rgba(34,201,132,.12);border-color:rgba(34,201,132,.25);color:#22C984}
.drive-status.disconnected{background:rgba(255,255,255,.05);border-color:var(--line);color:var(--sidebar-soft)}
.drive-status.syncing{background:rgba(240,120,48,.12);border-color:rgba(240,120,48,.25);color:var(--brand);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.main{flex:1;margin-left:256px;min-width:0}
.topbar{height:62px;background:rgba(19,21,31,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:30;gap:16px}
.topbar h1{font-size:17px;font-weight:700;letter-spacing:-.02em;white-space:nowrap;color:var(--ink)}
.topbar .sub{font-size:12px;color:var(--ink-soft);font-weight:400}
.menu-btn{display:none;background:none;border:1px solid var(--line);border-radius:9px;width:38px;height:38px;color:var(--ink)}
.content{padding:28px;max-width:1120px}
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink);padding:9px 16px;border-radius:9px;font-size:13.5px;font-weight:500;transition:all .15s;box-shadow:var(--shadow-sm)}
.btn:hover{border-color:rgba(240,120,48,.3);background:var(--surface-3);box-shadow:var(--shadow)}
.btn svg{width:15px;height:15px}
.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand-deep));border-color:transparent;color:#fff;box-shadow:0 4px 16px var(--brand-glow)}
.btn.primary:hover{background:linear-gradient(135deg,var(--brand-mid),var(--brand));box-shadow:0 6px 20px var(--brand-glow);transform:translateY(-1px)}
.btn.ghost{border-color:transparent;background:transparent;box-shadow:none;color:var(--ink-soft)}
.btn.ghost:hover{background:var(--surface-2);color:var(--ink)}
.btn.danger{color:var(--warn);border-color:rgba(255,82,99,.25);box-shadow:none;background:transparent}
.btn.danger:hover{background:var(--warn-tint);border-color:rgba(255,82,99,.4)}
.btn.sm{padding:5px 11px;font-size:12.5px;border-radius:7px}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;transition:all .2s}
.card:hover{border-color:rgba(240,120,48,.2);box-shadow:var(--shadow-glow)}
.card .hd{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface-2)}
.card .hd h2{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
.card .bd{padding:22px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:all .2s}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--brand),var(--brand-mid),transparent)}
.stat:hover{border-color:rgba(240,120,48,.3);box-shadow:var(--shadow-glow);transform:translateY(-2px)}
.stat .lbl{font-size:11px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:7px}
.stat .lbl svg{width:13px;height:13px;color:var(--brand)}
.stat .val{font-size:28px;font-weight:800;margin-top:10px;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1;color:var(--ink)}
.stat .val.green{color:var(--ok)} .stat .val.red{color:var(--warn)}
.stat .note{font-size:11px;color:var(--ink-muted);margin-top:7px}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:600;margin-bottom:7px;color:var(--ink-soft);letter-spacing:.04em;text-transform:uppercase}
.field .hint{font-size:11.5px;color:var(--ink-muted);font-weight:400;margin-top:4px}
.input,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:10px 13px;background:var(--surface-2);color:var(--ink);transition:all .15s;font-size:14px}
.input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint)}
.input:hover,select:hover{border-color:var(--surface-3)}
select option{background:var(--surface-2);color:var(--ink)}
textarea{resize:vertical;min-height:72px}
.row{display:grid;gap:16px}
.row.c2{grid-template-columns:1fr 1fr}
.row.c3{grid-template-columns:1fr 1fr 1fr}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-muted);font-weight:700;padding:11px 16px;border-bottom:1px solid var(--line);background:var(--surface-2)}
td{padding:13px 16px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle;color:var(--ink)}
tr:last-child td{border-bottom:0}
tbody tr{transition:background .1s}
tbody tr:hover{background:rgba(240,120,48,.06)}
.num{font-variant-numeric:tabular-nums;text-align:right}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.04em}
.badge.ok{background:var(--ok-tint);color:var(--ok)}
.badge.warn{background:var(--warn-tint);color:var(--warn)}
.badge.neutral{background:rgba(255,255,255,.07);color:var(--ink-soft)}
.badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:7px;background:var(--brand-tint);color:var(--brand);border:1px solid rgba(240,120,48,.2);letter-spacing:.02em}
.lineitem{border:1.5px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;background:var(--surface-2);box-shadow:var(--shadow-sm)}
.lineitem .li-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.month-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.month-grid label{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:7px 8px;border:1.5px solid var(--line);border-radius:8px;cursor:pointer;background:var(--surface-2);color:var(--ink-soft);transition:all .12s}
.month-grid label:hover{border-color:var(--brand);color:var(--brand)}
.month-grid input:checked+span{font-weight:700;color:var(--brand)}
.month-grid label:has(input:checked){border-color:var(--brand);background:var(--brand-tint);color:var(--brand);box-shadow:0 0 0 2px var(--brand-tint)}
.empty{text-align:center;padding:56px 20px;color:var(--ink-muted)}
.empty svg{width:44px;height:44px;color:var(--surface-3);margin-bottom:14px}
.empty h3{font-size:16px;color:var(--ink-soft);font-weight:700;margin-bottom:6px}
.empty p{font-size:13.5px}
.gs-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--line);font-size:13.5px;transition:background .1s;color:var(--ink)}
.gs-item:last-child{border-bottom:0}
.gs-item:hover{background:var(--brand-tint)}
.gs-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;flex:none;letter-spacing:.04em}
.gs-tag.ck{background:var(--blue-tint);color:var(--blue)}
.gs-tag.rec{background:var(--brand-tint);color:var(--brand)}
.gs-tag.ent{background:var(--purple-tint);color:var(--purple)}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,var(--surface-3),var(--surface-2));color:var(--ink);border:1px solid var(--brand);padding:13px 22px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:.25s cubic-bezier(.34,1.56,.64,1);z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 0 1px var(--brand-tint)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.overlay{position:fixed;inset:0;background:rgba(10,12,20,.75);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:60;overflow-y:auto;backdrop-filter:blur(6px)}
.overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:18px;width:100%;max-width:560px;box-shadow:0 24px 64px rgba(0,0,0,.6);animation:pop .2s cubic-bezier(.34,1.56,.64,1)}
.modal.wide{max-width:780px}
@keyframes pop{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:none}}
.modal .mh{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:var(--surface-2)}
.modal .mh h2{font-size:16px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
.modal .mb{padding:24px;max-height:68vh;overflow-y:auto}
.modal .mf{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;background:var(--surface-2)}
.close-x{background:none;border:0;font-size:20px;color:var(--ink-soft);line-height:1;width:32px;height:32px;border-radius:8px;transition:all .12s;display:grid;place-items:center}
.close-x:hover{background:var(--warn-tint);color:var(--warn)}
.searchbar{position:relative}
.searchbar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-soft)}
.searchbar input{padding-left:36px}
.upload{border:2px dashed var(--line);border-radius:12px;padding:18px;text-align:center;background:var(--surface-2);transition:border-color .15s}
.upload:hover{border-color:var(--brand)}
.upload img{max-height:80px;max-width:100%;margin:0 auto 10px;display:block}
.upload .ph{color:var(--ink-muted);font-size:13px;padding:14px 0}
#globalResults{background:var(--surface-2)!important;border-color:var(--line)!important}
.receipt{font-family:'Inter',-apple-system,sans-serif;color:#1A1614;background:#fff;width:100%;max-width:740px;margin:0 auto;border:1px solid #E4DDD3;border-radius:4px;overflow:hidden}
.r-stripe{height:5px;background:linear-gradient(90deg,#C85E1C 0%,#F07830 55%,#F9DFC8 100%)}
.r-inner{padding:32px 40px}
.r-head{display:flex;align-items:center;gap:16px;padding-bottom:18px;border-bottom:1px solid #EDE8E0;margin-bottom:22px}
.r-logo{width:52px;height:52px;flex:none;border-radius:10px;object-fit:contain;background:#FBEFE2;display:grid;place-items:center;color:#D96A14;font-weight:700;font-size:20px}
.r-org h2{font-size:15px;font-weight:700;color:#1A1614;letter-spacing:-.01em}
.r-org p{font-size:11px;color:#8A7E74;margin-top:2px}
.r-toprow{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:16px}
.r-numbadge{background:linear-gradient(135deg,#1A1614 60%,#2E2620);color:#fff;border-radius:10px;padding:12px 20px;display:inline-block;min-width:140px;border-left:3px solid #F07830;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.r-numbadge .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.18em;color:#9A8878;margin-bottom:4px;font-weight:600}
.r-numbadge .num{font-size:24px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:#fff;line-height:1}
.r-amount-box{text-align:right}
.r-amount-box .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:#8A7E74;margin-bottom:4px;font-weight:600}
.r-amount-box .val{font-size:30px;font-weight:800;color:#C85E1C;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1}
.r-amount-box .ext{font-size:11.5px;color:#8A7E74;font-style:italic;margin-top:4px}
.r-body{font-size:13.5px;line-height:1.85;color:#2A2622;background:#FDFAF7;border-radius:8px;padding:15px 18px;margin-bottom:16px;border-left:3px solid #D96A14}
.r-body b{font-weight:700;color:#1A1614}
.r-items{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px}
.r-items thead tr{background:#F6F3EF}
.r-items th{padding:9px 14px;text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:#8A7E74;font-weight:700;border-bottom:1px solid #EDE8E0}
.r-items td{padding:9px 14px;border-bottom:1px solid #F3EEE8;color:#2A2622}
.r-items tfoot td{font-weight:700;background:#F6F3EF;color:#1A1614;border-top:1px solid #EDE8E0}
.r-meta-row{display:flex;gap:28px;margin-bottom:16px;flex-wrap:wrap;padding:12px 16px;background:#F9F7F4;border-radius:8px}
.r-meta-item .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#8A7E74;font-weight:600;margin-bottom:3px}
.r-meta-item .val{font-size:13px;font-weight:600;color:#1A1614}
.r-obs{font-size:13px;color:#5A4E46;background:#FFFBF5;border:1px solid #F0E4D0;border-radius:6px;padding:10px 14px;margin-bottom:16px}
.r-obs b{color:#A8500C}
.r-nota{font-size:12.5px;color:#7a4a12;background:#FBEFE2;border-radius:6px;padding:9px 13px;margin-bottom:12px}
.r-divider{border:0;border-top:1px dashed #EDE8E0;margin:18px 0}
.r-localdata{font-size:13px;color:#5A4E46;text-align:right;margin-bottom:28px}
.r-sign{display:flex;flex-direction:column;align-items:center}
.r-sign img{max-height:90px;display:block;margin-bottom:0}
.r-sign .ln{border-top:1.5px solid #1A1614;width:240px;text-align:center;padding-top:8px;margin-top:0}
.r-sign .nm{font-size:13px;font-weight:700;color:#1A1614;letter-spacing:-.01em}
.r-sign .rl{font-size:11px;color:#6B5E54;margin-top:1px}
.r-foot{font-size:10px;color:#A89E92;text-align:center;padding:12px 40px;border-top:1px solid #EDE8E0;background:#FAF8F4}
/* recibo dentro do modal — fundo branco igual ao impresso */
.modal .receipt{background:#fff!important;border-color:#E4DDD3!important;color:#1A1614!important}
.modal .r-numbadge{background:#1A1614!important;color:#fff!important}
.modal .r-numbadge .lbl{color:#9A9088!important}
.modal .r-amount-box .val{color:#C85E1C!important}
.modal .r-items thead tr,.modal .r-items th{background:#F6F3EF!important;color:#8A7E74!important}
.modal .r-items td{color:#2A2622!important;border-bottom-color:#F3EEE8!important}
.modal .r-items tfoot td{background:#F6F3EF!important;color:#1A1614!important}
.modal .r-meta-row{background:#F9F7F4!important}
.modal .r-foot{background:#FAF8F4!important;color:#A89E92!important;border-top-color:#EDE8E0!important}
/* carta de cobrança */
.modal .carta-doc,.modal .carta-doc *{color:#1c1a17!important;background:#fff!important}
.modal .carta-doc a{color:#A8500C!important}
.r-situ{font-size:13px;margin:12px 0;padding:9px 13px;border-radius:8px}
.r-situ.ok{background:#E2F3EB;color:#1E7A52}
.r-situ.warn{background:#FDECEA;color:#C0392F}
.hidden{display:none!important}
@media(max-width:980px){.stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:860px){
  .sidebar{transform:translateX(-100%);transition:transform .22s;box-shadow:0 0 40px rgba(0,0,0,.6)}
  .sidebar.open{transform:none}
  .main{margin-left:0}
  .menu-btn{display:grid;place-items:center}
  .content{padding:18px}
  .row.c2,.row.c3{grid-template-columns:1fr}
  .month-grid{grid-template-columns:repeat(3,1fr)}
  .receipt{padding:24px 20px}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:39;display:none}
  .scrim.show{display:block}
}
#printArea{display:none}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff!important;margin:0!important;padding:0!important}
  .app,.sidebar,.topbar,.scrim,#toast,.overlay{display:none!important}
  #printArea{display:block!important;width:100%!important}
  /* recibo ocupa toda a página */
  #printArea .receipt{
    max-width:100%!important;width:100%!important;
    margin:0!important;border:0!important;border-radius:0!important;
    min-height:calc(29.7cm - 5cm)!important;
    display:flex!important;flex-direction:column!important;
  }
  #printArea .r-inner{flex:1!important;padding:28pt 40pt!important}
  /* faixa topo — preservar gradiente */
  #printArea .r-stripe{background:linear-gradient(90deg,#C85E1C,#F07830,#F9DFC8)!important;height:7px!important}
  /* cores preservadas */
  #printArea .r-numbadge{background:#1A1614!important;color:#fff!important}
  #printArea .r-numbadge .lbl{color:#9A9088!important}

<script>
"use strict";

/* ============ STATE ============ */
const LS_KEY = "kolping_recibos_v1";
const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MESES_ABV = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const FP = ["Dinheiro","PIX","Transferência","Cheque","Boleto"];

const defaultState = () => ({
  config:{
    razao:"Kolping Estadual de São Paulo",
    cnpj:"15.766.152/0001-77",
    endereco:"Rua Rio Branco, 36 — Carapicuíba/SP",
    assinante:"Henrique Martins Fernandes",
    cargo:"Assistente de Coordenação",
    org:"Kolping Estadual de São Paulo",
    valSocietaria:8.00,
    valSolidariedade:2.00,
    diaVenc:15,
    cidade:"Carapicuíba",
    logo:"", assinatura:""
  },
  comunidades:[],
  entidades:[],
  recibos:[],
  overrides:{},
  creditos:{},
  seq:1
});

let S = load();
function load(){
  try{const r=localStorage.getItem(LS_KEY);if(r){const p=JSON.parse(r);return Object.assign(defaultState(),p,{config:Object.assign(defaultState().config,p.config||{}),overrides:Object.assign({},p.overrides||{}),creditos:Object.assign({},p.creditos||{})});}}catch(e){}
  return defaultState();
}
function save(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(S));setTimeout(renderAvisos,50);}catch(e){toast("Erro ao salvar. Verifique o espaço do navegador.");}
  if(_driveToken&&!_driveSyncing){
    clearTimeout(save._driveDebounce);
    save._driveDebounce=setTimeout(driveSalvar,3000);
  }
}
const ANO_ATUAL=new Date().getFullYear();
function migrate(){
  const cf=S.config;
  if(!cf.taxasPorAno||!Object.keys(cf.taxasPorAno).length){
    cf.taxasPorAno={[ANO_ATUAL]:{soc:cf.valSocietaria||0,sol:cf.valSolidariedade||0}};
  }
  (S.comunidades||[]).forEach(co=>{
    if(!co.associadosPorAno||!Object.keys(co.associadosPorAno).length){
      co.associadosPorAno={[ANO_ATUAL]:{ef:co.efetivos||0,co:co.cooperadores||0}};
    }
  });
  (S.entidades||[]).forEach(en=>{
    if(!en.valorPorAno||!Object.keys(en.valorPorAno).length){
      en.valorPorAno={[ANO_ATUAL]:en.valor||0};
    }
  });
}
migrate();
// corrige cargo que ainda contenha " — Kolping Estadual de São Paulo"
(function fixCargo(){
  const c=S.config;
  if(c.cargo&&c.cargo.includes(" — ")){
    const parts=c.cargo.split(" — ");
    c.cargo=parts[0].trim();
    if(!c.org&&parts[1])c.org=parts[1].trim();
    save();
  }
})();
function maisRecenteAte(mapKeys,ano){const a=mapKeys.map(Number).filter(x=>x<=ano).sort((x,y)=>y-x);if(a.length)return a[0];const all=mapKeys.map(Number).sort((x,y)=>x-y);return all.length?all[0]:null;}
function taxaUnit(tipo,ano){const t=S.config.taxasPorAno||{};let y=t[ano];if(!y){const k=maisRecenteAte(Object.keys(t),ano);y=k!=null?t[k]:null;}if(!y)y={soc:S.config.valSocietaria||0,sol:S.config.valSolidariedade||0};return tipo==="societaria"?(+y.soc||0):(+y.sol||0);}
function assocAno(co,ano){const m=co.associadosPorAno||{};let y=m[ano];if(!y){const k=maisRecenteAte(Object.keys(m),ano);y=k!=null?m[k]:null;}if(!y)y={ef:co.efetivos||0,co:co.cooperadores||0};return (+y.ef||0)+(+y.co||0);}
function aluguelAno(en,ano){const m=en.valorPorAno||{};if(m[ano]!=null)return +m[ano]||0;const k=maisRecenteAte(Object.keys(m),ano);if(k!=null)return +m[k]||0;return +en.valor||0;}

/* ============ HELPERS ============ */
const $=s=>document.querySelector(s);
const el=(t,a={},...kids)=>{const n=document.createElement(t);for(const k in a){if(k==="class")n.className=a[k];else if(k==="html")n.innerHTML=a[k];else if(k.startsWith("on"))n.addEventListener(k.slice(2),a[k]);else if(a[k]!=null)n.setAttribute(k,a[k]);}kids.flat().forEach(c=>n.appendChild(typeof c==="string"?document.createTextNode(c):c));return n;};
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function brl(v){return (Number(v)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2600);}
function todayISO(){const d=new Date();return d.toISOString().slice(0,10);}
function fmtDateBR(iso){if(!iso)return"";const[y,m,d]=iso.split("-");return`${d}/${m}/${y}`;}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function onlyDigits(s){return String(s||"").replace(/\D/g,"");}
function maskCNPJ(v){const d=onlyDigits(v).slice(0,14);let o="";for(let i=0;i<d.length;i++){if(i===2||i===5)o+=".";if(i===8)o+="/";if(i===12)o+="-";o+=d[i];}return o;}
let _cnpjTimer=null;
function lookupCNPJ(d,statusEl,onFound){
  if(statusEl){statusEl.textContent="Buscando dados do CNPJ…";statusEl.style.color="var(--ink-soft)";}
  fetch("https://brasilapi.com.br/api/cnpj/v1/"+d).then(r=>{if(!r.ok)throw new Error("nf");return r.json();})
  .then(j=>{if(statusEl){statusEl.textContent="✓ "+(j.razao_social||j.nome_fantasia||"CNPJ encontrado");statusEl.style.color="var(--ok)";}onFound&&onFound(j);})
  .catch(err=>{if(statusEl){statusEl.textContent=(err&&err.message==="nf")?"CNPJ não encontrado na base.":"Não foi possível consultar agora (verifique a conexão).";statusEl.style.color="var(--ink-soft)";}});
}
function cnpjInput(inp,ctx){
  inp.value=maskCNPJ(inp.value);
  const statusEl=document.getElementById(ctx==="comunidade"?"f_cnpjStatus":"e_cnpjStatus");
  const d=onlyDigits(inp.value);
  if(statusEl&&d.length<14)statusEl.textContent="";
  clearTimeout(_cnpjTimer);
  if(d.length===14)_cnpjTimer=setTimeout(()=>{
    lookupCNPJ(d,statusEl,j=>{const nomeEl=document.getElementById(ctx==="comunidade"?"f_nome":"e_nome");if(nomeEl&&!nomeEl.value.trim())nomeEl.value=(j.nome_fantasia||j.razao_social||"");});
  },350);
}

/* valor por extenso (pt-BR, reais e centavos) */
function extenso(valor){
  valor=Math.round((Number(valor)||0)*100);
  const reais=Math.floor(valor/100), cent=valor%100;
  const u=["zero","um","dois","três","quatro","cinco","seis","sete","oito","nove","dez","onze","doze","treze","quatorze","quinze","dezesseis","dezessete","dezoito","dezenove"];
  const dez=["","","vinte","trinta","quarenta","cinquenta","sessenta","setenta","oitenta","noventa"];
  const cem=["","cento","duzentos","trezentos","quatrocentos","quinhentos","seiscentos","setecentos","oitocentos","novecentos"];
  function ate999(n){
    if(n===0)return"";
    if(n===100)return"cem";
    let p=[];
    const c=Math.floor(n/100), r=n%100;
    if(c>0)p.push(cem[c]);
    if(r>0){
      if(r<20)p.push(u[r]);
      else{const d=Math.floor(r/10),uu=r%10;p.push(uu>0?dez[d]+" e "+u[uu]:dez[d]);}
    }
    return p.join(" e ");
  }
  function grupos(n){
    if(n===0)return"zero";
    const mi=Math.floor(n/1000000), mil=Math.floor((n%1000000)/1000), c=n%1000;
    let p=[];
    if(mi>0)p.push(mi===1?"um milhão":ate999(mi)+" milhões");
    if(mil>0)p.push(mil===1?"mil":ate999(mil)+" mil");
    if(c>0)p.push(ate999(c));
    if(p.length===1)return p[0];
    // une grupos; "e" antes do último grupo quando for < 100 ou centena exata
    const last=p[p.length-1];
    const usaE = (c>0 && c<100) || (c>0 && c%100===0);
    return p.slice(0,-1).join(" ") + (usaE?" e ":" ") + last;
  }
  let txt="";
  if(reais>0){
    const deReais = reais>=1000000 && reais%1000000===0; // "um milhão de reais"
    txt=grupos(reais)+(deReais?" de":"")+(reais===1?" real":" reais");
  }
  if(cent>0){if(reais>0)txt+=" e ";txt+=grupos(cent)+(cent===1?" centavo":" centavos");}
  if(reais===0&&cent===0)txt="zero real";
  return txt.charAt(0).toUpperCase()+txt.slice(1);
}

/* ============ DOMAIN ============ */
function comunidade(id){return S.comunidades.find(c=>c.id===id);}
function entidade(id){return S.entidades.find(e=>e.id===id);}

/* Situação em dia / atraso (Solidariedade + Societária) — ano corrente */
function situacao(comId, refISO, anoOverride){
  const ref = refISO?new Date(refISO+"T12:00:00"):new Date();
  const ano = anoOverride||ref.getFullYear();
  const recs = S.recibos.filter(r=>r.pagadorTipo==="comunidade"&&r.pagadorId===comId);
  const solidPagos=new Set(), societPagos=new Set();
  recs.forEach(r=>r.itens.forEach(it=>{
    if(it.tipo==="solidariedade"&&it.meses)it.meses.forEach(m=>{if(m.ano===ano)solidPagos.add(m.mes);});
    if(it.tipo==="societaria"&&it.ano===ano)societPagos.add(ano);
  }));
  // overrides
  for(let m=0;m<12;m++){const ov=getOverride(comId,ano,m,"solidariedade");if(ov&&(ov.status==="pago"||ov.status==="isento"))solidPagos.add(m);}
  const ovSoc=getOverride(comId,ano,0,"societaria");if(ovSoc&&(ovSoc.status==="pago"||ovSoc.status==="isento"))societPagos.add(ano);
  const pend=[];
  const mesAtual=ref.getMonth(); // 0-based
  const dia=ref.getDate();
  for(let m=0;m<=mesAtual;m++){
    const venceu = m<mesAtual || dia>=(S.config.diaVenc||15);
    if(venceu && !solidPagos.has(m)) pend.push("Solidariedade "+MESES_ABV[m]+"/"+ano);
  }
  if(!societPagos.has(ano)) pend.push("Societária "+ano);
  return {emDia:pend.length===0, pendencias:pend, ano};
}


/* ---- Crédito (excedente Solidariedade) ---- */
function getCreditoDisp(coId){const c=S.creditos[coId]||[];return c.reduce((s,x)=>s+(+x.valor||0),0);}
function addCredito(coId,valor,refMes,refAno){if(valor<=0)return;if(!S.creditos[coId])S.creditos[coId]=[];S.creditos[coId].push({valor,refMes,refAno,em:todayISO()});}
function consumirCredito(coId,valor){
  if(!S.creditos[coId])return;
  let rest=valor;
  S.creditos[coId]=S.creditos[coId].map(c=>{if(rest<=0)return c;const use=Math.min(rest,+c.valor||0);rest-=use;return{...c,valor:c.valor-use};}).filter(c=>(+c.valor||0)>0.005);
  save();
}
function aplicarCreditoAoRecibo(recs, coId){
  // para cada item solidariedade, verifica excedente e gera crédito para o próximo mês
  recs.itens.forEach(it=>{
    if(it.tipo!=="solidariedade")return;
    const excedente=(+it.valor||0)-(+it.esperado||0);
    if(excedente>0.005){
      const ultimoMes=it.meses.length?it.meses.slice().sort((a,b)=>a.mes-b.mes)[it.meses.length-1]:null;
      let proxM=ultimoMes?ultimoMes.mes+1:0, proxA=ultimoMes?ultimoMes.ano:ANO_ATUAL;
      if(proxM>11){proxM=0;proxA++;}
      addCredito(coId,excedente,proxM,proxA);
      it._creditoGerado={valor:excedente,proxMes:MESES[proxM],proxAno:proxA};
    }
    // abater crédito disponível no esperado
    const credDisp=getCreditoDisp(coId);
    if(credDisp>0&&(+it.esperado||0)>0){
      const abate=Math.min(credDisp,+it.esperado||0);
      it._creditoAbatido=abate;
      consumirCredito(coId,abate);
    }
  });
}

const PAGES=[

];
const ICONS={bell:'<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>',
  grid:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',

  home:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  gear:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>'
};
function svg(name){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||""}</svg>`;}

let current="dashboard";
function buildNav(){
  const nav=$("#nav");nav.innerHTML="";
  PAGES.forEach(p=>{
    if(p.sec){nav.appendChild(el("div",{class:"sec"},p.sec));return;}
    if(!p.label)return;
    const b=el("button",{class:current===p.id?"active":"",onclick:()=>go(p.id)});
    b.innerHTML=svg(p.icon)+"<span>"+p.label+"</span>";
    nav.appendChild(b);
  });
}
function go(id,data){current=id;const p=PAGES.find(x=>x.id===id);if(!p)return;
  if(id==="ck_detail"&&data){_ckDetailId=data.id;$("#pageTitle").textContent=data.nome;$("#pageSub").textContent="Situação detalhada de pagamentos";}
  else{$("#pageTitle").textContent=p.title;$("#pageSub").textContent=p.sub;}
  buildNav();$("#topActions").innerHTML="";toggleMenu(false);render();window.scrollTo(0,0);}
function toggleMenu(open){$("#sidebar").classList.toggle("open",open);$("#scrim").classList.toggle("show",open);}

  ({dashboard:renderDashboard,emitir:renderEmitir,comunidades:renderComunidades,entidades:renderEntidades,historico:renderHistorico,relatorio:renderRelatorio,config:renderConfig,ck_detail:renderCKDetail}[current]||renderDashboard)();
}

/* ---- Dashboard ---- */
let _dashAno=ANO_ATUAL;
function renderDashboard(){
  const c=$("#content");
  // seletor de ano
  const anos=[...new Set([ANO_ATUAL,...S.recibos.map(r=>r.data?+r.data.slice(0,4):ANO_ATUAL)])].sort((a,b)=>b-a);
  const selDiv=el("div",{style:"display:flex;align-items:center;gap:12px;margin-bottom:20px"});
  selDiv.innerHTML=`<label style="font-size:13px;font-weight:500;color:var(--ink-soft)">Ano do painel:</label><select id="dashAno" style="padding:7px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px">${anos.map(a=>`<option value="${a}"${a===_dashAno?" selected":""}>${a}</option>`).join("")}</select>`;
  selDiv.querySelector("select").addEventListener("change",e=>{_dashAno=+e.target.value;renderDashboard();});
  c.appendChild(selDiv);

  const ano=_dashAno, mes=new Date().getMonth();
  const doAno=S.recibos.filter(r=>r.data&&r.data.startsWith(ano+""));
  const doMes=doAno.filter(r=>Number(r.data.slice(5,7))===mes+1);
  const totAno=doAno.reduce((s,r)=>s+r.total,0);
  const totMes=doMes.reduce((s,r)=>s+r.total,0);
  let emDia=0,atraso=0;
  S.comunidades.forEach(co=>{situacao(co.id,null,ano).emDia?emDia++:atraso++;});
  // totais de associados
  let totEf=0,totCo=0;
  S.comunidades.forEach(co=>{const m=co.associadosPorAno||{};const y=m[ano]||m[maisRecenteAte(Object.keys(m),ano)]||{ef:co.efetivos||0,co:co.cooperadores||0};totEf+=+y.ef||0;totCo+=+y.co||0;});

  const stats=el("div",{class:"stats"});
  stats.style.gridTemplateColumns="repeat(3,1fr)";
  const mk=(lbl,val,cls,note,icon)=>{const s=el("div",{class:"stat"});s.innerHTML=`<div class="lbl">${svg(icon)} ${lbl}</div><div class="val ${cls||""}">${val}</div>${note?`<div class="note">${note}</div>`:""}`;return s;};
  stats.append(
    mk("Recebido no mês",brl(totMes),"","Em "+MESES[mes]+" de "+ano,"file"),
    mk("Recebido no ano",brl(totAno),"",doAno.length+" recibo(s) em "+ano,"clock"),
    mk("Comunidades em dia",emDia,"green","Solidariedade + Societária "+ano,"users"),
    mk("Comunidades em atraso",atraso,atraso>0?"red":"green",atraso>0?"Requer atenção":"Tudo em ordem","users"),
    mk("Associados efetivos",totEf,"","Total em "+ano+" (todas as CKs)","users"),
    mk("Associados cooperadores",totCo,"","Total em "+ano+" (todas as CKs)","users")
  );
  stats.style.gridTemplateColumns="repeat(3,1fr)";
  c.appendChild(stats);

  // gráficos de evolução
  const grafRow=el("div",{style:"display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px"});

  // Gráfico 1: Arrecadação mensal do ano
  const g1=el("div",{class:"card"});
  g1.appendChild(el("div",{class:"hd"},el("h2",{},"Arrecadação mensal — "+ano)));
  const g1b=el("div",{class:"bd",style:"padding:16px 20px 8px"});
  const valMeses=MESES_ABV.map((_,mi)=>{
    return S.recibos.filter(r=>r.data&&+r.data.slice(0,4)===ano&&Number(r.data.slice(5,7))===mi+1).reduce((s,r)=>s+(+r.total||0),0);
  });
  const maxVal=Math.max(...valMeses,1);
  // dimensões absolutas: viewBox 600 x 180
  const W=600,H=160,padL=8,padR=8,padT=28,padB=24;
  const chartW=W-padL-padR, chartH=H-padT-padB;
  const bw=Math.floor(chartW/12), gap=4;
  let svgBars='';
  // linha de grade suave
  [0.25,0.5,0.75,1].forEach(pct=>{
    const y=padT+chartH-(chartH*pct);
    svgBars+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#F0EBE3" stroke-width="1"/>`;
  });
  valMeses.forEach((v,i)=>{
    const barH=Math.max(v>0?4:0, Math.round((v/maxVal)*chartH));
    const x=padL+i*bw+gap/2;
    const y=padT+chartH-barH;
    const isAtual=i===mes;
    const fill=isAtual?'#D96A14':'#F5DFC5';
    const fillTop=isAtual?'#F0883A':'#FBEFE2';
    const id=`bg${i}`;
    // gradiente por barra
    svgBars+=`<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${fillTop}"/><stop offset="100%" stop-color="${fill}"/></linearGradient></defs>`;
    if(barH>0)svgBars+=`<rect x="${x}" y="${y}" width="${bw-gap}" height="${barH}" fill="url(#${id})" rx="4"/>`;
    // label do mês
    svgBars+=`<text x="${x+(bw-gap)/2}" y="${H-6}" text-anchor="middle" font-size="11" fill="${isAtual?'#A8500C':'#9A8878'}" font-family="Inter,sans-serif" font-weight="${isAtual?'700':'400'}">${MESES_ABV[i]}</text>`;
    // valor acima da barra
    if(v>0){
      const vLabel=v>=1000?(v/1000).toFixed(1)+'k':v.toFixed(0);
      svgBars+=`<text x="${x+(bw-gap)/2}" y="${y-5}" text-anchor="middle" font-size="10" fill="${isAtual?'#A8500C':'#B8A090'}" font-family="Inter,sans-serif" font-weight="600">${vLabel}</text>`;
    }
  });
  g1b.innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;overflow:visible">${svgBars}</svg>`;
  g1.appendChild(g1b);

  // Gráfico 2: CKs em dia vs atraso (donut)
  const g2=el("div",{class:"card"});
  g2.appendChild(el("div",{class:"hd"},el("h2",{},"Situação das CKs")));
  const g2b=el("div",{class:"bd",style:"padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px"});
  const total=S.comunidades.length||1;
  const pct=Math.round((emDia/total)*100);
  const circ=2*Math.PI*38;
  const dash=circ*(emDia/total);
  g2b.innerHTML=`
    <svg viewBox="0 0 100 100" style="width:140px;height:140px">
      <circle cx="50" cy="50" r="38" fill="none" stroke="var(--warn-tint)" stroke-width="12"/>
      <circle cx="50" cy="50" r="38" fill="none" stroke="var(--ok)" stroke-width="12"
        stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ/4}"
        stroke-linecap="round" transform="rotate(-90 50 50)"/>
      <text x="50" y="46" text-anchor="middle" font-size="20" font-weight="800" fill="var(--ink)" font-family="Inter,sans-serif">${pct}%</text>
      <text x="50" y="60" text-anchor="middle" font-size="8" fill="var(--ink-soft)" font-family="Inter,sans-serif">em dia</text>
    </svg>
    <div style="display:flex;gap:16px;font-size:12.5px">
      <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:var(--ok);display:inline-block"></span>${emDia} em dia</span>
      <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:var(--warn);display:inline-block"></span>${atraso} em atraso</span>
    </div>`;
  g2.appendChild(g2b);

  grafRow.append(g1,g2);
  c.appendChild(grafRow);

  // ── Segunda fileira: estilo trader ──
  const grafRow2=el("div",{style:"display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px"});

  // cores trader
  const T={bg:"#0F1117",grid:"#1E2235",axisT:"#4A5580",green:"#00E5A0",greenD:"#00B87A",greenGlow:"rgba(0,229,160,.15)",red:"#FF4D6A",redD:"#CC2244",yellow:"#F5C842",white:"#E8ECF4",muted:"#6B7BA4"};

  // Gráfico 3: Recebido × Pendente — velas/barras estilo candle
  const recebMeses=MESES_ABV.map((_,mi)=>
    S.recibos.filter(r=>r.data&&+r.data.slice(0,4)===ano&&Number(r.data.slice(5,7))===mi+1).reduce((s,r)=>s+(+r.total||0),0)
  );
  const pendMeses=MESES_ABV.map((_,mi)=>{
    if(mi>mes)return 0;
    return S.comunidades.reduce((s,co)=>{
      const sit=getMesSit(co.id,ano,mi,"solidariedade");
      return s+(sit.status==="pago"||sit.status==="isento"?0:assocAno(co,ano)*taxaUnit("solidariedade",ano));
    },0);
  });
  const maxG3=Math.max(...recebMeses,...pendMeses,1);
  const W3=600,H3=180,pL3=42,pR3=12,pT3=16,pB3=26;
  const cW3=W3-pL3-pR3,cH3=H3-pT3-pB3;
  const bw3=Math.floor(cW3/12),gap3=8,bwh=Math.floor((bw3-gap3)/2);
  let s3=`<rect width="${W3}" height="${H3}" fill="${T.bg}" rx="10"/>`;
  // grid lines + eixo Y
  [0,.25,.5,.75,1].forEach(p=>{
    const y=pT3+cH3-(cH3*p);
    s3+=`<line x1="${pL3}" y1="${y}" x2="${W3-pR3}" y2="${y}" stroke="${T.grid}" stroke-width="1"/>`;
    if(p>0){const lbl=brl(maxG3*p).replace('R$','').trim();s3+=`<text x="${pL3-5}" y="${y+4}" text-anchor="end" font-size="9" fill="${T.axisT}" font-family="Inter,sans-serif">${lbl}</text>`;}
  });
  MESES_ABV.forEach((_,i)=>{
    const xBase=pL3+i*bw3;
    const hR=Math.max(recebMeses[i]>0?3:0,Math.round((recebMeses[i]/maxG3)*cH3));
    const hP=Math.max(pendMeses[i]>0?3:0,Math.round((pendMeses[i]/maxG3)*cH3));
    const isAtual=i===mes;
    // barra recebido (verde neon)
    if(hR>0){
      s3+=`<defs><linearGradient id="gr${i}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${T.green}"/><stop offset="100%" stop-color="${T.greenD}" stop-opacity=".7"/></linearGradient></defs>`;
      s3+=`<rect x="${xBase+gap3/2}" y="${pT3+cH3-hR}" width="${bwh}" height="${hR}" fill="url(#gr${i})" rx="2"/>`;
      if(recebMeses[i]>0){const vl=recebMeses[i]>=1000?(recebMeses[i]/1000).toFixed(1)+'k':recebMeses[i].toFixed(0);s3+=`<text x="${xBase+gap3/2+bwh/2}" y="${pT3+cH3-hR-4}" text-anchor="middle" font-size="8" fill="${T.green}" font-family="Inter,sans-serif" font-weight="600">${vl}</text>`;}
    }
    // barra pendente (vermelho neon)
    if(hP>0){
      s3+=`<defs><linearGradient id="rr${i}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${T.red}"/><stop offset="100%" stop-color="${T.redD}" stop-opacity=".7"/></linearGradient></defs>`;
      s3+=`<rect x="${xBase+gap3/2+bwh+2}" y="${pT3+cH3-hP}" width="${bwh}" height="${hP}" fill="url(#rr${i})" rx="2" opacity=".85"/>`;
    }
    // linha vertical atual
    if(isAtual)s3+=`<line x1="${xBase+bw3/2}" y1="${pT3}" x2="${xBase+bw3/2}" y2="${pT3+cH3}" stroke="${T.yellow}" stroke-width="1" stroke-dasharray="3,3" opacity=".5"/>`;
    s3+=`<text x="${xBase+bw3/2}" y="${H3-8}" text-anchor="middle" font-size="9" fill="${isAtual?T.yellow:T.muted}" font-family="Inter,sans-serif" font-weight="${isAtual?'700':'400'}">${MESES_ABV[i]}</text>`;
  });
  // legenda
  s3+=`<rect x="${pL3}" y="4" width="8" height="8" fill="${T.green}" rx="1"/><text x="${pL3+11}" y="12" font-size="9" fill="${T.white}" font-family="Inter,sans-serif">Recebido</text>`;
  s3+=`<rect x="${pL3+70}" y="4" width="8" height="8" fill="${T.red}" rx="1"/><text x="${pL3+81}" y="12" font-size="9" fill="${T.white}" font-family="Inter,sans-serif">Pendente</text>`;
  const g3=el("div",{class:"card",style:"overflow:hidden"});
  g3.appendChild(el("div",{class:"hd"},el("h2",{},"Recebido × Pendente — "+ano)));
  const g3b=el("div",{style:"padding:0;background:#0F1117;border-radius:0 0 16px 16px"});
  g3b.innerHTML=`<svg viewBox="0 0 ${W3} ${H3}" style="width:100%;height:auto;display:block">${s3}</svg>`;
  g3.appendChild(g3b);

  // Gráfico 4: Evolução de associados — linha estilo trading
  const anosAssoc=[...new Set(S.comunidades.flatMap(co=>Object.keys(co.associadosPorAno||{})).map(Number))].sort((a,b)=>a-b);
  if(anosAssoc.length<1)anosAssoc.push(ANO_ATUAL);
  const totEfAno=anosAssoc.map(a=>S.comunidades.reduce((s,co)=>{const m=co.associadosPorAno||{};const y=m[a]||m[maisRecenteAte(Object.keys(m),a)];return s+(y?+y.ef||0:0);},0));
  const totCoAno=anosAssoc.map(a=>S.comunidades.reduce((s,co)=>{const m=co.associadosPorAno||{};const y=m[a]||m[maisRecenteAte(Object.keys(m),a)];return s+(y?+y.co||0:0);},0));
  const totTotAno=anosAssoc.map((_,i)=>totEfAno[i]+totCoAno[i]);
  const maxA=Math.max(...totTotAno,1), minA=Math.max(0,Math.min(...totTotAno)-Math.round(Math.max(...totTotAno)*.15));
  const W4=600,H4=180,pL4=38,pR4=16,pT4=16,pB4=26;
  const cW4=W4-pL4-pR4,cH4=H4-pT4-pB4;
  const nA=anosAssoc.length;
  let s4=`<rect width="${W4}" height="${H4}" fill="${T.bg}" rx="10"/>`;
  // grid
  [0,.33,.66,1].forEach(p=>{
    const yg=pT4+cH4-(cH4*p);
    s4+=`<line x1="${pL4}" y1="${yg}" x2="${W4-pR4}" y2="${yg}" stroke="${T.grid}" stroke-width="1"/>`;
    const lv=Math.round(minA+(maxA-minA)*p);
    s4+=`<text x="${pL4-5}" y="${yg+4}" text-anchor="end" font-size="9" fill="${T.axisT}" font-family="Inter,sans-serif">${lv}</text>`;
  });
  const pts=anosAssoc.map((a,i)=>{
    const x=nA===1?pL4+cW4/2:pL4+i*(cW4/(nA-1));
    const y=pT4+cH4-Math.round(((totTotAno[i]-minA)/(maxA-minA||1))*cH4);
    return{x,y,ef:totEfAno[i],co:totCoAno[i],tot:totTotAno[i],a};
  });
  if(pts.length>1){
    const poly=pts.map(p=>`${p.x},${p.y}`).join(' ');
    const area=`${pts[0].x},${pT4+cH4} ${poly} ${pts[pts.length-1].x},${pT4+cH4}`;
    s4+=`<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${T.green}" stop-opacity=".3"/><stop offset="100%" stop-color="${T.green}" stop-opacity="0"/></linearGradient></defs>`;
    s4+=`<polygon points="${area}" fill="url(#ag)"/>`;
    s4+=`<polyline points="${poly}" fill="none" stroke="${T.green}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="drop-shadow(0 0 4px ${T.green})"/>`;
  }
  pts.forEach((p,i)=>{
    const isLast=i===pts.length-1;
    s4+=`<circle cx="${p.x}" cy="${p.y}" r="${isLast?6:4}" fill="${T.bg}" stroke="${isLast?T.green:T.muted}" stroke-width="${isLast?2.5:1.5}"/>`;
    if(isLast)s4+=`<circle cx="${p.x}" cy="${p.y}" r="10" fill="${T.green}" opacity=".12"/>`;
    s4+=`<text x="${p.x}" y="${p.y-10}" text-anchor="middle" font-size="${isLast?11:9}" fill="${isLast?T.green:T.muted}" font-family="Inter,sans-serif" font-weight="${isLast?'700':'500'}">${p.tot}</text>`;
    s4+=`<text x="${p.x}" y="${H4-8}" text-anchor="middle" font-size="9" fill="${T.muted}" font-family="Inter,sans-serif">${p.a}</text>`;
  });
  // rodapé com ef/coop
  const lastP=pts[pts.length-1]||{ef:0,co:0,tot:0};
  const g4=el("div",{class:"card",style:"overflow:hidden"});
  g4.appendChild(el("div",{class:"hd"},el("h2",{},"Evolução de associados")));
  const g4b=el("div",{style:"padding:0;background:#0F1117;border-radius:0 0 16px 16px"});
  g4b.innerHTML=`<svg viewBox="0 0 ${W4} ${H4}" style="width:100%;height:auto;display:block">${s4}</svg>
    <div style="display:flex;gap:20px;font-size:12px;padding:10px 16px;border-top:1px solid #1E2235">
      <span style="color:#6B7BA4">Efetivos: <b style="color:#E8ECF4">${lastP.ef}</b></span>
      <span style="color:#6B7BA4">Cooperadores: <b style="color:#E8ECF4">${lastP.co}</b></span>
      <span style="color:#6B7BA4">Total: <b style="color:#00E5A0;font-size:14px">${lastP.tot}</b></span>
    </div>`;
  g4.appendChild(g4b);

  grafRow2.append(g3,g4);
  c.appendChild(grafRow2);

  // alerta de backup
  const ult=S.config.ultimoBackup;
  const diasBackup=ult?Math.floor((Date.now()-new Date(ult).getTime())/(1000*60*60*24)):null;
  const alertaDiv=el("div",{id:"backupAlerta",style:`display:${(!ult||diasBackup>=7)?"flex":"none"};align-items:center;justify-content:space-between;gap:12px;background:#FFF8E6;border:1px solid #F5C842;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13.5px`});
  alertaDiv.innerHTML=`<span>⚠️ <b>${!ult?"Você ainda não fez nenhum backup.":"Último backup há "+diasBackup+" dia(s)."}</b> Recomendamos fazer backup semanalmente para não perder dados.</span>`;
  const btnBk=el("button",{class:"btn sm primary",onclick:()=>{exportData();registrarBackup();}});btnBk.textContent="Fazer backup agora";
  alertaDiv.appendChild(btnBk);
  c.appendChild(alertaDiv);

  // previsão de arrecadação do mês
  const esperadoMes=S.comunidades.reduce((s,co)=>s+assocAno(co,ano)*taxaUnit("solidariedade",ano),0);
  const pctReal=esperadoMes>0?Math.min(100,Math.round((totMes/esperadoMes)*100)):0;
  const prevCard=el("div",{class:"card",style:"margin-bottom:20px"});
  const prevHd=el("div",{class:"hd"});prevHd.innerHTML=`<h2>Previsão de arrecadação — ${MESES[mes]} ${ano}</h2><span style="font-size:13px;color:var(--ink-soft)">${pctReal}% realizado</span>`;
  prevCard.appendChild(prevHd);
  const prevBd=el("div",{class:"bd",style:"padding:16px 22px"});
  prevBd.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
      <div style="font-size:13px;color:var(--ink-soft)">Recebido: <b style="color:var(--ok);font-size:16px">${brl(totMes)}</b></div>
      <div style="font-size:13px;color:var(--ink-soft)">Esperado: <b style="color:var(--ink);font-size:16px">${brl(esperadoMes)}</b></div>
      <div style="font-size:13px;color:var(--ink-soft)">Pendente: <b style="color:var(--warn);font-size:16px">${brl(Math.max(0,esperadoMes-totMes))}</b></div>
    </div>
    <div style="background:var(--surface-2);border-radius:8px;height:10px;overflow:hidden">
      <div style="height:100%;width:${pctReal}%;background:linear-gradient(90deg,var(--ok),#44E8A0);border-radius:8px;transition:width .5s ease"></div>
    </div>`;
  prevCard.appendChild(prevBd);
  c.appendChild(prevCard);

  // atalhos rápidos
  const secAtl=el("div",{style:"margin-bottom:20px"});
  secAtl.appendChild(el("div",{style:"font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:600;margin-bottom:10px"},"Atalhos rápidos"));
  renderAtalhos(secAtl,ano);
  c.appendChild(secAtl);

  // últimos recibos
  const card=el("div",{class:"card"});
  card.appendChild(el("div",{class:"hd"},el("h2",{},"Últimos recibos"),el("button",{class:"btn primary sm",onclick:()=>go("emitir")},"+ Novo recibo")));
  const bd=el("div",{class:"bd"});bd.style.padding="0";
  const recs=[...S.recibos].sort((a,b)=>b.numero-a.numero).slice(0,8);
  if(!recs.length){bd.innerHTML=emptyHTML("file","Nenhum recibo ainda","Clique em \u201cNovo recibo\u201d para começar.");}
  else{
    const tb=el("table");
    tb.innerHTML="<thead><tr><th>Nº</th><th>Data</th><th>Pagador</th><th>Referência</th><th class='num'>Valor</th></tr></thead>";
    const body=el("tbody");
    recs.forEach(r=>{
      const tr=el("tr",{style:"cursor:pointer",onclick:()=>verRecibo(r.id)});
      tr.innerHTML=`<td><span class="pill">${numFmt(r)}</span></td><td>${fmtDateBR(r.data)}</td><td><b>${esc(pagadorLabel(r))}</b></td><td>${esc(resumoRef(r))}</td><td class="num">${brl(r.total)}</td>`;
      body.appendChild(tr);
    });
    tb.appendChild(body);bd.appendChild(tb);
  }
  card.appendChild(bd);c.appendChild(card);

  // atraso list
  if(atraso>0){
    const ca=el("div",{class:"card"});ca.style.marginTop="20px";
    ca.appendChild(el("div",{class:"hd"},el("h2",{},"Comunidades com pendências")));
    const b2=el("div",{class:"bd"});b2.style.padding="0";
    const tb=el("table");tb.innerHTML="<thead><tr><th>Comunidade</th><th>Pendências</th><th></th></tr></thead>";
    const body=el("tbody");
    S.comunidades.forEach(co=>{const st=situacao(co.id);if(st.emDia)return;
      const tr=el("tr");
      tr.innerHTML=`<td><b>${esc(co.nome)}</b></td><td style="color:var(--warn);font-size:13px">${st.pendencias.join(" · ")}</td>`;

function emptyHTML(icon,h,p){return `<div class="empty">${svg(icon)}<h3>${h}</h3><p>${p}</p></div>`;}
function resumoRef(r){return r.itens.map(it=>it.refTexto).join(" · ").slice(0,60)||"—";}
function pagadorLabel(r){return r.pagadorNome||"—";}
function numFmt(r){return String(r.numero)+"/"+( r.data?r.data.slice(0,4):String(new Date().getFullYear()));}
function dataPorExtenso(iso){if(!iso)return"";const[y,m,d]=iso.split("-");return parseInt(d,10)+" de "+MESES[parseInt(m,10)-1].toLowerCase()+" de "+y;}
function listaPt(arr){if(!arr.length)return"";if(arr.length===1)return arr[0];return arr.slice(0,-1).join(", ")+" e "+arr[arr.length-1];}
function buildReferente(itens){
  const fr=itens.map(it=>{
    if(it.tipo==="solidariedade"){
      const ms=(it.meses||[]).slice().sort((a,b)=>a.mes-b.mes).map(m=>MESES[m.mes]);
      let s="taxa de solidariedade de "+listaPt(ms)+" de "+it.ano;
      if(it.ajuste==="parcial")s+=" (pagamento parcial)";
      else if(it.ajuste==="adiantado")s+=" (pagamento adiantado)";
      return s;
    }
    if(it.tipo==="societaria")return "taxa societária de "+it.ano;
    let s="aluguel";
    const ref=(it.refTexto||"").replace(/^\s*aluguel\s*(ref\.|referente a)?\s*/i,"").trim();
    if(ref)s+=" de "+ref;
    if(it.juros>0)s+=" (com juros de atraso)";
    return s;
  });
  const joined=listaPt(fr);
  return (/^aluguel/i.test(joined)?"referente ao ":"referente a ")+joined;
}
function proxMes(mes,ano){let m=mes+1,a=ano;if(m>11){m=0;a++;}return{mes:m,ano:a};}
function mesesNomesPt(meses){return listaPt(meses.slice().sort((a,b)=>a.mes-b.mes).map(m=>MESES[m.mes]));}
function buildNotas(itens){
  const dia=S.config.diaVenc||15, notas=[];
  itens.forEach(it=>{
    if(it.tipo!=="solidariedade"||!it.meses||!it.meses.length)return;
    const ult=it.meses.slice().sort((a,b)=>a.mes-b.mes)[it.meses.length-1];
    const px=proxMes(ult.mes,it.ano);
    const venc=String(dia).padStart(2,"0")+"/"+String(px.mes+1).padStart(2,"0")+"/"+px.ano;
    if(it.ajuste==="parcial"){
      const falta=Math.max(0,(it.esperado||0)-(it.valor||0));
      notas.push(`Pagamento parcial referente a ${mesesNomesPt(it.meses)} de ${it.ano}: recebido ${brl(it.valor)} de ${brl(it.esperado)}. Falta ${brl(falta)}, que deverá ser pago até ${venc}.`);
    }else if(it.ajuste==="adiantado"){
      notas.push(`Pagamento adiantado referente a ${mesesNomesPt(it.meses)} de ${it.ano}, no valor de ${brl(it.valor)}. O próximo pagamento deverá ser realizado até ${venc}.`);
    }
  });
  return notas;
}
function pagadorProse(r){
  if(r.pagadorTipo==="comunidade"){
    let nm=(r.pagadorNome||"").toUpperCase();
    if(!/^COMUNIDADE\b/.test(nm))nm="COMUNIDADE KOLPING "+nm;
    return{conector:"da",nome:nm,portador:"portadora"};
  }
  return{conector:"de",nome:(r.pagadorNome||"").toUpperCase(),portador:"portador(a)"};
}

// situação de um mês: pago|parcial|isento|atraso|futuro
function getMesSit(coId,ano,mes,tipo){
  // override manual
  const ov=getOverride(coId,ano,mes,tipo);
  if(ov)return ov;
  // verificar recibos
  const recs=S.recibos.filter(r=>r.pagadorTipo==="comunidade"&&r.pagadorId===coId);
  if(tipo==="solidariedade"){
    for(const r of recs){for(const it of r.itens){if(it.tipo==="solidariedade"&&it.ano===ano&&(it.meses||[]).some(m=>m.mes===mes))return{status:"pago",valor:it.valor,rec:r.id};}}
    const hoje=new Date(),venc=new Date(ano,mes,S.config.diaVenc||15);
    if(hoje<venc)return{status:"futuro"};
    return{status:"atraso"};
  }else{
    for(const r of recs){for(const it of r.itens){if(it.tipo==="societaria"&&it.ano===ano)return{status:"pago",valor:it.valor,rec:r.id};}}
    if(new Date().getFullYear()<ano)return{status:"futuro"};
    return{status:"atraso"};
  }
}
function getOverride(coId,ano,mes,tipo){
  if(!S.overrides)return null;
  const k=coId+":"+ano+":"+mes+":"+tipo;
  return S.overrides[k]||null;
}
function setOverride(coId,ano,mes,tipo,sit){
  if(!S.overrides)S.overrides={};
  const k=coId+":"+ano+":"+mes+":"+tipo;
  if(sit===null)delete S.overrides[k];else S.overrides[k]=sit;
  save();
}

function emitirRapido(co,tipo,ano,mes,valBase){
  const mn=tipo==="societaria"?"Societária "+ano:MESES[mes]+" de "+ano;
  const n=assocAno(co,ano);
  const valCalc=n*taxaUnit(tipo,ano)*(tipo==="solidariedade"?1:1);
  const credDisp=getCreditoDisp(co.id);
  const valFinal=Math.max(0,valCalc-credDisp);

function formEntidade(id){
  const en=id?entidade(id):{nome:"",cnpj:"",valor:0};
  const m=(en.valorPorAno&&Object.keys(en.valorPorAno).length)?en.valorPorAno:{[ANO_ATUAL]:en.valor||0};
  _rentDraft=Object.keys(m).map(y=>({ano:+y,val:+m[y]||0})).sort((a,b)=>b.ano-a.ano);
  openModal(id?"Editar entidade":"Nova entidade locatária",`
    <div class="field"><label>Nome da entidade</label><input class="input" id="e_nome" value="${esc(en.nome)}"></div>
    <div class="field"><label>CNPJ <span class="hint">(digite para buscar)</span></label><input class="input" id="e_cnpj" value="${esc(en.cnpj)}" placeholder="00.000.000/0000-00" oninput="cnpjInput(this,'entidade')"><div class="hint" id="e_cnpjStatus" style="margin-top:5px"></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin:18px 0 8px">
      <label style="font-size:13px;font-weight:500">Valor do aluguel por ano</label>
      <button class="btn sm" type="button" onclick="addRentAno()">+ Adicionar ano</button>
    </div>
    <div id="rentRows"></div>
    <p class="hint" style="margin-top:8px">Recibos de anos anteriores usam o valor do aluguel daquele ano.</p>
  `,()=>{
    const nome=$("#e_nome").value.trim();if(!nome){toast("Informe o nome.");return false;}
    const vpa={};_rentDraft.forEach(r=>{if(r.ano)vpa[r.ano]=+r.val||0;});
    if(!Object.keys(vpa).length)vpa[ANO_ATUAL]=0;
    const ak=vpa[ANO_ATUAL]!=null?ANO_ATUAL:Math.max(...Object.keys(vpa).map(Number));
    const data={nome,cnpj:$("#e_cnpj").value.trim(),valorPorAno:vpa,valor:+vpa[ak]||0};
    if(id)Object.assign(entidade(id),data);else S.entidades.push(Object.assign({id:uid()},data));
    save();render();toast("Entidade salva.");
  });
  renderRentRows();
}
function renderRentRows(){
  const w=document.getElementById("rentRows");if(!w)return;
  let h=`<table><thead><tr><th>Ano</th><th>Valor mensal (R$)</th><th></th></tr></thead><tbody>`;
  _rentDraft.forEach((r,i)=>{h+=`<tr><td><input class="input" type="number" style="max-width:100px" data-i="${i}" data-k="ano" value="${r.ano}"></td><td><input class="input" type="number" step="0.01" min="0" style="max-width:180px" data-i="${i}" data-k="val" value="${r.val}"></td><td class="num"><button class="btn ghost sm danger" data-rm="${i}">Remover</button></td></tr>`;});
  h+=`</tbody></table>`;w.innerHTML=h;
  w.querySelectorAll("input[data-i]").forEach(inp=>inp.addEventListener("input",e=>{const i=+e.target.dataset.i,k=e.target.dataset.k;_rentDraft[i][k]=+e.target.value||0;}));
  w.querySelectorAll("button[data-rm]").forEach(b=>b.addEventListener("click",()=>{if(_rentDraft.length<=1){toast("Mantenha ao menos um ano.");return;}_rentDraft.splice(+b.dataset.rm,1);renderRentRows();}));
}
function addRentAno(){
  const anos=_rentDraft.map(r=>+r.ano);
  const novo=anos.length?Math.max(...anos)+1:ANO_ATUAL;
  const base=_rentDraft.slice().sort((a,b)=>b.ano-a.ano)[0]||{val:0};
  _rentDraft.push({ano:novo,val:base.val||0});renderRentRows();
}
function delEntidade(id){confirmBox("Excluir esta entidade locatária?",()=>{S.entidades=S.entidades.filter(e=>e.id!==id);save();render();toast("Entidade excluída.");});}

function syncPagador(){

function renderAddBtns(){

  }else{
    w.append(el("button",{class:"btn sm",onclick:()=>addItem("aluguel")},"+ Aluguel"));
  }

function addItem(tipo){
  const ano=ANO_ATUAL;
  if(tipo==="solidariedade")draft.itens.push({id:uid(),tipo,ano,meses:[],valor:0,esperado:0,ajuste:"integral",refTexto:"",manual:false});
  else if(tipo==="societaria")draft.itens.push({id:uid(),tipo,ano,valor:0,refTexto:"",manual:false});
  else{const en=entidade(draft.pagadorId);const base=en?aluguelAno(en,ano):0;draft.itens.push({id:uid(),tipo,ano,base,jurosPct:0,mesesAtraso:0,valor:base,refTexto:"Aluguel ref. "+MESES_ABV[new Date().getMonth()]+"/"+ano,manual:false});}
  recalcItem(draft.itens[draft.itens.length-1]);
  renderItens();updatePreview();
}
function recalcItem(it){
  const co=comunidade(draft.pagadorId);
  if(it.tipo==="solidariedade"){
    const n=co?assocAno(co,it.ano):0;
    it.esperado=n*taxaUnit("solidariedade",it.ano)*(it.meses.length||0);
    if(it.ajuste!=="parcial"&&!it.manual)it.valor=it.esperado;
    const nomes=it.meses.length?it.meses.slice().sort((a,b)=>a.mes-b.mes).map(m=>MESES_ABV[m.mes]).join(", ")+"/"+it.ano:"—";
    const marca=it.ajuste==="parcial"?" (parcial)":it.ajuste==="adiantado"?" (adiantado)":"";
    it.refTexto="Solidariedade ref. "+nomes+marca;
  }else if(it.tipo==="societaria"){
    const n=co?assocAno(co,it.ano):0;
    if(!it.manual)it.valor=n*taxaUnit("societaria",it.ano);
    it.refTexto="Societária "+it.ano;
  }else if(it.tipo==="aluguel"){
    const juros=(it.base||0)*((it.jurosPct||0)/100)*(it.mesesAtraso||0);
    it.juros=juros;
    if(!it.manual)it.valor=(it.base||0)+juros;
  }
}

      const ref=el("div",{class:"field"});ref.innerHTML=`<label>Referência (texto)</label><input class="input" value="${esc(it.refTexto)}">`;
      ref.querySelector("input").addEventListener("input",e=>{it.refTexto=e.target.value;updatePreview();});
      box.appendChild(ref);
    }

    // valor editável
    const isParcial=it.tipo==="solidariedade"&&it.ajuste==="parcial";
    const vrow=el("div",{style:"display:flex;align-items:flex-end;gap:12px;justify-content:space-between;border-top:1px dashed var(--line);padding-top:12px;margin-top:4px"});
    const vf=el("div",{class:"field",style:"margin:0;flex:1"});
    const vlbl=isParcial?'Valor pago agora':('Valor do item '+(it.manual?'<span class="hint">(ajustado manualmente)</span>':'<span class="hint">(calculado)</span>'));
    vf.innerHTML=`<label>${vlbl}</label><input class="input" id="iv_${it.id}" type="number" step="0.01" value="${(it.valor||0).toFixed(2)}">`;
    vf.querySelector("input").addEventListener("input",e=>{
      it.valor=+e.target.value||0;
      if(isParcial){
        const f=$("#falta_"+it.id),falta=Math.max(0,(it.esperado||0)-(it.valor||0));
        if(f)f.innerHTML=`Esperado no mês: <b>${brl(it.esperado)}</b> · Falta: <b>${brl(falta)}</b> (a pagar no mês seguinte).`;
      }else{it.manual=true;vf.querySelector("label").innerHTML='Valor do item <span class="hint">(ajustado manualmente)</span>';}
      updatePreview();
    });
    vrow.appendChild(vf);
    if(it.manual&&!isParcial){const rb=el("button",{class:"btn ghost sm",onclick:()=>{it.manual=false;recalcItem(it);renderItens();updatePreview();}},"Recalcular");vrow.appendChild(rb);}
    box.appendChild(vrow);
    if(it.tipo==="aluguel"&&it.juros>0)box.appendChild(el("div",{class:"hint",style:"margin-top:-4px"},`Aluguel ${brl(it.base)} + juros ${brl(it.juros)} (${it.jurosPct}% × ${it.mesesAtraso} ${it.mesesAtraso===1?"mês":"meses"}).`));
    w.appendChild(box);
  });
  const tot=draft.itens.reduce((s,it)=>s+(+it.valor||0),0);
  w.appendChild(el("div",{style:"text-align:right;font-size:17px;font-weight:700;padding-top:6px"},"Total: "+brl(tot)));
}
function updateItemValor(it,box){const inp=box.querySelector("#iv_"+it.id);if(inp&&!it.manual)inp.value=(it.valor||0).toFixed(2);}

function buildReciboObj(numero){
  const tot=draft.itens.reduce((s,it)=>s+(+it.valor||0),0);
  let nome="",doc="";
  if(draft.pagadorTipo==="comunidade"){const co=comunidade(draft.pagadorId);nome=co?co.nome:"";doc=co?co.cnpj:"";}
  else{const en=entidade(draft.pagadorId);nome=en?en.nome:"";doc=en?en.cnpj:"";}
  return{
    id:uid(),numero,data:draft.data,pagadorTipo:draft.pagadorTipo,pagadorId:draft.pagadorId,
    pagadorNome:nome,pagadorDoc:doc,formaPag:draft.formaPag,obs:draft.obs,
    itens:draft.itens.map(it=>({...it})),total:tot,emitidoEm:todayISO()
  };
}
function updatePreview(){
  const pv=$("#d_preview");if(!pv)return;
  if(!draft.pagadorId||!draft.itens.length){pv.innerHTML=`<div style="color:var(--ink-soft);font-size:13.5px;text-align:center;padding:30px 10px">Selecione o pagador e adicione itens para ver o recibo.</div>`;return;}
  const obj=buildReciboObj(S.seq);
  pv.innerHTML=reciboHTML(obj,true);
}
function emitirRecibo(){
  if(!draft.pagadorId){toast("Selecione o pagador.");return;}
  if(!draft.itens.length){toast("Adicione ao menos um item.");return;}
  const tot=draft.itens.reduce((s,it)=>s+(+it.valor||0),0);
  if(tot<=0){toast("O total precisa ser maior que zero.");return;}
  for(const it of draft.itens){if(it.tipo==="solidariedade"&&!it.meses.length){toast("Selecione os meses da Solidariedade.");return;}}
  const obj=buildReciboObj(S.seq);
  if(draft.pagadorTipo==="comunidade")aplicarCreditoAoRecibo(obj,draft.pagadorId);
  S.recibos.push(obj);S.seq++;save();
  draft=null;
  // guarda o id da CK para poder voltar
  const _origemCK=obj.pagadorTipo==="comunidade"?obj.pagadorId:null;
  // modal pós-emissão
  const pdfFn=()=>gerarPDF(obj);
  const botoesModal=[
    {label:"Ver recibo",cls:"ghost",fn:()=>{closeModal();verRecibo(obj.id);}},
    {label:"⬇ Baixar PDF",cls:"ghost",fn:()=>gerarPDF(obj)},
    {label:"📲 Baixar PDF + abrir WhatsApp",cls:"primary",fn:()=>pdfEwhatsapp(obj)}
  ];
  if(_origemCK&&_ckDetailId===_origemCK){
    const co=comunidade(_origemCK);
    if(co)botoesModal.unshift({label:"← Voltar para "+co.nome,cls:"ghost",fn:()=>{closeModal();go("ck_detail",co);}});
  }
  openModal("Recibo "+numFmt(obj)+" emitido!",
    `<p style="font-size:14.5px;line-height:1.7">O recibo foi registrado com sucesso.</p>
     <div style="background:var(--ok-tint);color:var(--ok);border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px">
       <b>Próximo passo:</b> Baixe o PDF e depois encaminhe pelo WhatsApp.
     </div>`,
    null,botoesModal);
}

  if(!recs.length){bd.innerHTML=emptyHTML("clock",S.recibos.length?"Nada encontrado":"Nenhum recibo emitido",S.recibos.length?"Tente outro termo de busca.":"Os recibos emitidos aparecem aqui.");return;}

function uploadBox(label,val,key){
  const f=el("div",{class:"field"});
  f.innerHTML=`<label>${label}</label><div class="upload" id="up_${key}">${val?`<img src="${val}">`:`<div class="ph">Nenhuma imagem</div>`}<div style="display:flex;gap:8px;justify-content:center;margin-top:8px"><button class="btn sm" type="button">Escolher</button>${val?'<button class="btn sm ghost danger" type="button">Remover</button>':""}</div></div>`;
  const btns=f.querySelectorAll("button");
  btns[0].addEventListener("click",()=>pickImage(key));
  if(val)btns[1].addEventListener("click",()=>{S.config[key]="";save();renderConfig();});
  return f;
}
function pickImage(key){
  const inp=el("input",{type:"file",accept:"image/*"});
  inp.addEventListener("change",e=>{const file=e.target.files[0];if(!file)return;
    if(file.size>1.5*1024*1024){toast("Imagem muito grande (máx. 1,5 MB).");return;}
    const fr=new FileReader();fr.onload=()=>{S.config[key]=fr.result;save();renderConfig();updateBrandLogo();toast("Imagem salva.");};fr.readAsDataURL(file);});
  inp.click();
}

function openModal(title,bodyHTML,onSave,buttons,cls){
  const ov=$("#overlay");
  const foot=buttons?buttons.map((b,i)=>`<button class="btn ${b.cls||""}" data-i="${i}">${b.label}</button>`).join("")
    :`<button class="btn ghost" data-act="cancel">Cancelar</button><button class="btn primary" data-act="save">Salvar</button>`;
  ov.innerHTML=`<div class="modal ${cls||""}"><div class="mh"><h2>${title}</h2><button class="close-x" data-act="cancel">×</button></div><div class="mb">${bodyHTML}</div><div class="mf">${foot}</div></div>`;
  ov.classList.add("show");
  ov.querySelectorAll("[data-act='cancel']").forEach(b=>b.onclick=closeModal);
  const sv=ov.querySelector("[data-act='save']");if(sv)sv.onclick=()=>{if(onSave&&onSave()===false)return;closeModal();};
  if(buttons)ov.querySelectorAll("[data-i]").forEach(b=>b.onclick=()=>buttons[+b.dataset.i].fn());
  ov.onclick=e=>{if(e.target===ov)closeModal();};
}

function getAvisos(){
  const av=[];
  const hoje=new Date(), dia=hoje.getDate(), mesH=hoje.getMonth(), anoH=hoje.getFullYear();
  const venc=S.config.diaVenc||15;
  S.comunidades.forEach(co=>{
    // só avisar se a CK já tem pelo menos um recibo — sem histórico não faz sentido cobrar
    const temRecibo=S.recibos.some(r=>r.pagadorTipo==="comunidade"&&r.pagadorId===co.id);
    if(!temRecibo)return;
    const st=situacao(co.id);
    if(!st.emDia){
      st.pendencias.forEach(p=>{av.push({tipo:"atraso",msg:`${co.nome}: ${p}`,coId:co.id});});
    }
    // aviso 3 dias antes do vencimento
    const diff=venc-dia;
    if(diff>0&&diff<=3){
      const sit=getMesSit(co.id,anoH,mesH,"solidariedade");
      if(sit.status!=="pago"&&sit.status!=="isento"){
        av.push({tipo:"alerta",msg:`${co.nome}: Solidariedade ${MESES_ABV[mesH]}/${anoH} vence em ${diff} dia(s).`,coId:co.id});
      }
    }
  });
  return av;
}
function renderAvisos(){
  const av=getAvisos();
  const btn=document.getElementById("avisoBtn");
  if(btn){btn.querySelector(".badge-count").textContent=av.length>0?av.length:"";btn.style.display=av.length>0?"flex":"none";}
}

function verAvisosModal(){
  const av=getAvisos();

  const rows=av.map(a=>`<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--line-soft)"><span style="font-size:18px">${a.tipo==="atraso"?"🔴":"🟡"}</span><div><div style="font-size:14px">${esc(a.msg)}</div>${a.coId?`<button class="btn ghost sm" style="margin-top:6px" onclick="closeModal();go('ck_detail',comunidade('${a.coId}'))">Ver CK</button>`:""}</div></div>`).join("");
  openModal("Avisos de pagamento",`<div>${rows}</div>`,null,[

    {label:"Fechar",cls:"ghost",fn:closeModal}
  ]);
}

/* ── PDF real via html2canvas + jsPDF ── */
async function gerarPDFReal(r,abrirWpp=false){
  const evtBtn=document.activeElement;
  if(evtBtn&&evtBtn.tagName==="BUTTON"){evtBtn.disabled=true;evtBtn._orig=evtBtn.textContent;evtBtn.textContent="Gerando…";}
  try{
    const div=document.createElement("div");
    div.style.cssText="position:fixed;left:-9999px;top:0;width:794px;background:#fff;z-index:-1";
    div.innerHTML=reciboHTML(r);
    document.body.appendChild(div);
    await new Promise(res=>setTimeout(res,250));
    const canvas=await html2canvas(div,{scale:2,useCORS:true,backgroundColor:"#fff",logging:false});
    document.body.removeChild(div);
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const imgW=190,imgH=(canvas.height*imgW)/canvas.width;
    pdf.addImage(canvas.toDataURL("image/jpeg",0.95),"JPEG",10,10,imgW,Math.min(imgH,277));
    const nome=`Recibo_${numFmt(r).replace("/","_")}_${(r.pagadorNome||"").replace(/\s+/g,"_").slice(0,30)}.pdf`;
    pdf.save(nome);
    if(abrirWpp)setTimeout(()=>window.open("https://web.whatsapp.com","_blank"),500);
    toast("PDF salvo: "+nome);
  }catch(e){
    console.error("PDF error:",e);
    $("#printArea").innerHTML=reciboHTML(r);
    setTimeout(()=>window.print(),60);
    toast("Usando impressão do navegador.");
  }finally{
    if(evtBtn&&evtBtn._orig){evtBtn.disabled=false;evtBtn.textContent=evtBtn._orig;delete evtBtn._orig;}
  }
}
function gerarPDF(r){
  if(window.html2canvas&&window.jspdf){gerarPDFReal(r);}
  else{$("#printArea").innerHTML=reciboHTML(r);setTimeout(()=>window.print(),60);}
}
function pdfEwhatsapp(r){
  if(window.html2canvas&&window.jspdf){gerarPDFReal(r,true);}
  else{$("#printArea").innerHTML=reciboHTML(r);setTimeout(()=>{window.print();setTimeout(()=>window.open("https://web.whatsapp.com","_blank"),800);},60);}
}

/* ============ IMPORTAR CKs DE PLANILHA ============ */
function importarCKs(e){
  const file=e.target.files[0];if(!file)return;
  const fr=new FileReader();
  fr.onload=()=>{
    const text=fr.result;
    const linhas=text.split(/\r?\n/).filter(l=>l.trim());
    if(!linhas.length){toast("Arquivo vazio.");return;}
    // detectar cabeçalho
    const header=linhas[0].split(/[,;]/).map(h=>h.trim().toLowerCase().replace(/['"]/g,""));
    const iNome=header.findIndex(h=>h.includes("nome")||h.includes("comunidade"));
    const iCnpj=header.findIndex(h=>h.includes("cnpj"));
    const iEf=header.findIndex(h=>h.includes("efetivo"));
    const iCo=header.findIndex(h=>h.includes("cooper"));
    if(iNome<0){toast("Coluna 'nome' não encontrada. Verifique o arquivo.");return;}
    let adicionadas=0,ignoradas=0;
    linhas.slice(1).forEach(linha=>{
      const cols=linha.split(/[,;]/).map(c=>c.trim().replace(/['"]/g,""));
      const nome=cols[iNome]||"";
      if(!nome){ignoradas++;return;}
      const jaExiste=S.comunidades.some(c=>c.nome.toLowerCase()===nome.toLowerCase());
      if(jaExiste){ignoradas++;return;}
      S.comunidades.push({
        id:uid(),nome,
        cnpj:iCnpj>=0?cols[iCnpj]||"":"",
        efetivos:iEf>=0?+cols[iEf]||0:0,
        cooperadores:iCo>=0?+cols[iCo]||0:0,
        associadosPorAno:{[ANO_ATUAL]:{ef:iEf>=0?+cols[iEf]||0:0,co:iCo>=0?+cols[iCo]||0:0}}
      });
      adicionadas++;
    });
    save();render();
    toast(`${adicionadas} comunidade(s) importada(s). ${ignoradas>0?ignoradas+" ignorada(s) (já existem ou sem nome).":""}`);
  };
  fr.readAsText(file,"UTF-8");
  e.target.value="";
}

/* ============ ATALHOS DE TECLADO ============ */
document.addEventListener("keydown",e=>{
  // ignorar quando em input/textarea/select
  if(["INPUT","TEXTAREA","SELECT"].includes(e.target.tagName))return;
  const ctrl=e.ctrlKey||e.metaKey;
  if(ctrl&&e.key==="t"){e.preventDefault();toggleTema();}
  if(ctrl&&e.key==="n"){e.preventDefault();draft=null;go("emitir");}
  if(ctrl&&e.key==="f"){e.preventDefault();const gs=document.getElementById("globalSearch");if(gs){gs.focus();gs.select();}}
  if(ctrl&&e.key==="h"){e.preventDefault();go("historico");}
  if(ctrl&&e.key==="d"){e.preventDefault();go("dashboard");}
  if(e.key==="Escape"&&$("#overlay").classList.contains("show"))closeModal();
});

const DBX_FILE_PATH="/kolping_recibos_dados.json";
let _dbxToken=null,_dbxSyncing=false;

  const btn=document.getElementById("driveStatusBtn");

function iniciarLoginDropbox(){
  const token=S.config.dropboxToken||"";
  openModal("Conectar Dropbox",`
    <p style="font-size:14px;line-height:1.7;margin-bottom:16px">Para usar o Dropbox, gere um token de acesso seguindo os passos:</p>
    <ol style="font-size:13.5px;line-height:2;color:var(--ink-soft);padding-left:20px">
      <li>Acesse <a href="https://www.dropbox.com/developers/apps" target="_blank" style="color:var(--brand)">dropbox.com/developers/apps</a></li>
      <li>Clique em <b>Create app</b></li>
      <li>Escolha <b>Scoped access</b> → <b>Full Dropbox</b></li>
      <li>Dê um nome: <b>KolpingRecibos</b> e clique em <b>Create app</b></li>
      <li>Na aba <b>Permissions</b>, marque: <b>files.content.read</b> e <b>files.content.write</b> → clique em <b>Submit</b></li>
      <li>Na aba <b>Settings</b>, role até <b>OAuth 2</b> → clique em <b>Generate</b> (ao lado de "Generated access token")</li>
      <li>Copie o token gerado e cole abaixo</li>
    </ol>
    <div class="field" style="margin-top:16px"><label>Token de acesso do Dropbox</label>
    <input class="input" id="dbxTokenInput" placeholder="sl.xxxxxxxxxxxxxxxx..." value="${esc(token)}" type="password"></div>
    <p style="font-size:12px;color:var(--ink-muted);margin-top:8px">⚠️ O token dá acesso à sua conta Dropbox. Guarde com segurança e não compartilhe.</p>
  `,null,[
    {label:"Cancelar",cls:"ghost",fn:closeModal},
    {label:"Conectar",cls:"primary",fn:()=>{
      const v=document.getElementById("dbxTokenInput").value.trim();
      if(!v){toast("Informe o token.");return;}
      S.config.dropboxToken=v;save();
      _dbxToken=v;
      localStorage.setItem("kolping_dbx_token",v);
      closeModal();
      dbxSetStatus("connected","Dropbox conectado ✓");
      toast("Dropbox conectado!");
      dbxSyncAuto();
    }}
  ]);
}

async function dbxRequest(path,body,isDownload=false){
  if(!_dbxToken)return null;
  try{
    const headers={"Authorization":"Bearer "+_dbxToken,"Content-Type":"application/json"};
    const opts={method:"POST",headers};
    if(body!==undefined)opts.body=JSON.stringify(body);
    const r=await fetch("https://api.dropboxapi.com/2/"+path,opts);
    if(r.status===401){_dbxToken=null;localStorage.removeItem("kolping_dbx_token");S.config.dropboxToken="";save();dbxSetStatus("disconnected","Conectar Dropbox");toast("Token inválido. Reconecte o Dropbox.");return null;}
    if(!r.ok)return null;
    return r.json();
  }catch(e){return null;}
}

async function dbxSalvar(){
  if(!_dbxToken||_dbxSyncing)return;
  _dbxSyncing=true;dbxSetStatus("syncing","Salvando no Dropbox…");
  try{
    const content=JSON.stringify(S,null,2);
    const r=await fetch("https://content.dropboxapi.com/2/files/upload",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+_dbxToken,
        "Dropbox-API-Arg":JSON.stringify({path:DBX_FILE_PATH,mode:"overwrite",autorename:false,mute:true}),
        "Content-Type":"application/octet-stream"
      },
      body:content
    });
    if(r.ok){dbxSetStatus("connected","Dropbox salvo ✓ — "+new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}));}
    else{dbxSetStatus("connected","Dropbox conectado ✓");}
  }catch(e){dbxSetStatus("connected","Dropbox conectado ✓");}
  finally{_dbxSyncing=false;}
}

async function dbxCarregar(){
  if(!_dbxToken)return false;
  dbxSetStatus("syncing","Carregando do Dropbox…");
  try{
    const r=await fetch("https://content.dropboxapi.com/2/files/download",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+_dbxToken,
        "Dropbox-API-Arg":JSON.stringify({path:DBX_FILE_PATH})
      }
    });
    if(!r.ok){dbxSetStatus("connected","Dropbox conectado ✓");return false;}
    const text=await r.text();
    const parsed=JSON.parse(text);
    if(!parsed.config||!Array.isArray(parsed.comunidades)){dbxSetStatus("connected","Dropbox conectado ✓");return false;}
    S=Object.assign(defaultState(),parsed,{config:Object.assign(defaultState().config,parsed.config||{}),overrides:Object.assign({},parsed.overrides||{}),creditos:Object.assign({},parsed.creditos||{})});
    save();go("dashboard");dbxSetStatus("connected","Dropbox sincronizado ✓");
    toast("Dados carregados do Dropbox!");
    return true;
  }catch(e){dbxSetStatus("connected","Dropbox conectado ✓");return false;}
}

let _dbxAutoTimer=null;
function dbxSyncAuto(){
  dbxCarregar();
  clearInterval(_dbxAutoTimer);
  _dbxAutoTimer=setInterval(()=>{if(_dbxToken)dbxSalvar();},120000);
}

// alias para compatibilidade com botões existentes
function driveSalvar(){dbxSalvar();}
function driveCarregar(){dbxCarregar();}
